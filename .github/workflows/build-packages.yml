name: Build Package
on:
  workflow_dispatch:
  push:
    tags:
      - '*'
permissions:
  contents: write
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            cmd: npm run buildDebian
            artifact: linux-deb-package
            path: dist/app/*.deb
          - os: ubuntu-latest
            cmd: npm run buildRedhat
            artifact: linux-rpm-package
            path: dist/app/*.rpm
          - os: windows-latest
            cmd: npm run buildWindows
            artifact: windows-package
            path: |
              dist/app/*.zip
              dist/app/*.exe
          - os: macos-15
            env:
              SDKROOT: /Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk
            cmd: npm run buildMacIntel
            artifact: darwin-x86-package
            path: dist/app/*.zip
          - os: macos-15
            env:
              SDKROOT: /Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk
            cmd: npm run buildMacArm
            artifact: darwin-arm-package
            path: dist/app/*.zip
    env:
      SDKROOT: ${{ matrix.env.SDKROOT }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 25
    - run: npm install --omit=optional
    - name: build package
      run: ${{ matrix.cmd }}
    - name: upload package
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: ${{ matrix.path }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: download build artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist/release-assets
        merge-multiple: true
    - name: generate release notes
      shell: bash
      run: |
        current_tag="${GITHUB_REF_NAME}"
        current_commit="$(git rev-list -n 1 "$current_tag")"
        previous_tag="$(git describe --tags --abbrev=0 "${current_commit}^" 2>/dev/null || true)"

        {
          echo "## Changes"
          echo

          if [ -n "$previous_tag" ]; then
            git log "${previous_tag}..${current_tag}" --pretty=format:'- %s'
            echo
            echo
          else
            git log "${current_tag}" --pretty=format:'- %s'
          fi
        } > RELEASE_NOTES.md
    - name: publish release assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        body_path: RELEASE_NOTES.md
        files: |
          dist/release-assets/**/*.zip
          dist/release-assets/**/*.exe
          dist/release-assets/**/*.deb
          dist/release-assets/**/*.rpm
